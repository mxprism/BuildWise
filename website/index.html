<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuildWise</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <h1>BuildWise</h1>

<div class="calculator-fields">
  <label for="material-name">Material Name</label>
  <div class="input-row">
    <input type="text" id="material-name" name="material-name" />
    <button type="button" class="clear-field" data-input="material-name" aria-label="Clear material name">×</button>
  </div>

  <label for="quantity">Quantity</label>
  <div class="input-row">
    <input type="number" id="quantity" name="quantity" />
    <button type="button" class="clear-field" data-input="quantity" aria-label="Clear quantity">×</button>
  </div>

  <label for="price">Price per Item (£)</label>
  <div class="input-row">
    <input type="text" id="price" name="price" inputmode="decimal" autocomplete="off" />
    <button type="button" class="clear-field" data-input="price" aria-label="Clear price">×</button>
  </div>

  <button type="button" id="clear-all-button">Clear All</button>
</div>

<div class="button-group">
  <button type="button" id="calculate-button">Calculate</button>
  <button type="button" id="past-calculations-button">Past Calculations</button>
  <button type="button" id="add-all-button">Add All</button>
  <button type="button" id="clear-history-button">Clear Past Calculations</button>
</div>

<p>Total: <span id="total">£0.00</span></p>

<section id="history-section" hidden>
  <h2>Past Calculations</h2>
  <ul id="calculation-history"></ul>
</section>
