<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuildWise</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <h1>BuildWise</h1>

    <label for="material-name">Material Name</label>
    <input type="text" id="material-name" name="material-name" />

    <label for="quantity">Quantity</label>
    <input type="number" id="quantity" name="quantity" min="0" />

    <label for="price">Price per Item (£)</label>
    <input type="number" id="price" name="price" min="0" step="0.01" />

    <div class="button-group">
      <button type="button" id="calculate">Calculate</button>
      <button type="button" id="clear-all">Clear All</button>
      <button type="button" id="past-calculations">Past Calculations</button>
      <button type="button" id="add-all">Add All</button>
    </div>

    <p>Total: <span id="total">£0.00</span></p>

    <section id="history-section" hidden>
      <h2>Past Calculations</h2>
      <ul id="calculation-history"></ul>
    </section>
  </body>
</html>
